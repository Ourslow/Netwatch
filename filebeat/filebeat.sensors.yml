filebeat.inputs:

  # ============================================================
  # ZEEK LOGS (analyse protocolaire)
  # ============================================================
  - type: log
    enabled: true
    paths:
      # Zeek (invocation CLI directe, sans zeekctl) écrit les logs à plat dans
      # son WORKDIR ($cwd) — pas de sous-dossier "current/". WORKDIR = /zeek/logs
      # (le volume monté), donc les fichiers atterrissent directement ici.
      - /zeek/logs/conn.log
      - /zeek/logs/dns.log
      - /zeek/logs/http.log
      - /zeek/logs/ssl.log
      - /zeek/logs/ssh.log
      - /zeek/logs/notice.log
      - /zeek/logs/intel.log
      - /zeek/logs/weird.log
      - /zeek/logs/files.log
      - /zeek/logs/x509.log
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: zeek
      engine: zeek

  # ============================================================
  # SNORT 3 LOGS (IDS signatures)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /var/log/snort/alert_json.txt
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: snort
      engine: snort

  # ============================================================
  # SURICATA LOGS (IDS EVE JSON)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: suricata
      engine: suricata

  # ============================================================
  # GOFLOW2 — NetFlow / IPFIX / sFlow (T_017)
  # ============================================================
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*-json.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - drop_event:
          when:
            not:
              equals:
                container.name: "netwatch-goflow2"
      - decode_json_fields:
          fields: ["message"]
          target: "netflow"
          overwrite_keys: false
          add_error_key: true
    fields:
      log_type: netflow
      engine: netflow
    fields_under_root: true
    index: "netflow-%{+yyyy.MM.dd}"

processors:
  - add_host_metadata: ~
  - timestamp:
      field: ts
      layouts:
        - '2006-01-02T15:04:05.999999Z07:00'
        - '2006-01-02T15:04:05.999999+0000'
      test:
        - '2024-01-01T12:00:00.000000Z'
      ignore_failure: true
  - timestamp:
      field: timestamp
      layouts:
        - '2006-01-02T15:04:05.999999Z07:00'
        - '2006-01-02T15:04:05Z'
      ignore_failure: true

# Déploiement 2-VMs : Elasticsearch tourne sur la VM Data (192.168.100.12),
# pas de résolution DNS par nom de service Docker possible entre VMs distinctes.
output.elasticsearch:
  hosts: ["192.168.100.12:9200"]
  index: "%{[engine]:unknown}-%{+yyyy.MM.dd}"
  bulk_max_size: 500

setup.template.enabled: false
setup.ilm.enabled: false

logging.level: info
logging.to_files: false
