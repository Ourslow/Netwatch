filebeat.inputs:

  # ============================================================
  # ZEEK LOGS (analyse protocolaire)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /zeek/logs/current/conn.log
      - /zeek/logs/current/dns.log
      - /zeek/logs/current/http.log
      - /zeek/logs/current/ssl.log
      - /zeek/logs/current/ssh.log
      - /zeek/logs/current/notice.log
      - /zeek/logs/current/intel.log
      - /zeek/logs/current/weird.log
      - /zeek/logs/current/files.log
      - /zeek/logs/current/x509.log
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: zeek
      engine: zeek

  # ============================================================
  # SNORT 3 LOGS (IDS signatures)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /var/log/snort/alert_json.txt
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: snort
      engine: snort

  # ============================================================
  # SURICATA LOGS (IDS EVE JSON)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: suricata
      engine: suricata

  # ============================================================
  # GOFLOW2 — NetFlow / IPFIX / sFlow (T_017)
  # ============================================================
  # GoFlow2 écrit du JSON sur stdout → Docker capture dans /var/lib/docker/containers/
  # L'input type:container lit le fichier -json.log, add_docker_metadata filtre
  # le container netwatch-goflow2, decode_json_fields extrait les champs du flux.
  # Index cible : netflow-YYYY.MM.DD (template géré par setup-netflow.sh)
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*-json.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - drop_event:
          when:
            not:
              equals:
                container.name: "netwatch-goflow2"
      - decode_json_fields:
          fields: ["message"]
          target: "netflow"
          overwrite_keys: false
          add_error_key: true
    fields:
      log_type: netflow
      engine: netflow
    fields_under_root: true
    index: "netflow-%{+yyyy.MM.dd}"

processors:
  - add_host_metadata: ~
  - timestamp:
      field: ts
      layouts:
        - '2006-01-02T15:04:05.999999Z07:00'
        - '2006-01-02T15:04:05.999999+0000'
      test:
        - '2024-01-01T12:00:00.000000Z'
      ignore_failure: true
  - timestamp:
      field: timestamp
      layouts:
        - '2006-01-02T15:04:05.999999Z07:00'
        - '2006-01-02T15:04:05Z'
      ignore_failure: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "%{[engine]:unknown}-%{+yyyy.MM.dd}"
  bulk_max_size: 500

# ============================================================
# Index template & ILM — gestion manuelle (fix T_002)
# ============================================================
# Filebeat 8.x sur ES 8.x tente systématiquement de créer un data-stream
# "netwatch" via putDataStream(), même quand setup.ilm.enabled=false.
# Avec l'ancienne valeur "zeek-*,snort-*,suricata-*,netwatch-*", ES 8.x
# normalisait le pattern en "*" (catch-all), ce qui provoquait une erreur
# 500 "_data_stream_timestamp disabled" bloquant les reconnexions.
#
# Fix : setup.template.enabled=false délègue entièrement la gestion des
# templates à setup-es.sh (index-templates netwatch-zeek/snort/suricata,
# priorité 500 + pipeline netwatch-geoip). Filebeat ne touche plus aux
# templates et n'appelle plus putDataStream() → plus d'erreur reconnexion.
setup.template.enabled: false
setup.ilm.enabled: false

logging.level: info
logging.to_files: false
