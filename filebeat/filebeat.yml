filebeat.inputs:

  # ============================================================
  # ZEEK LOGS (analyse protocolaire)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /zeek/logs/current/conn.log
      - /zeek/logs/current/dns.log
      - /zeek/logs/current/http.log
      - /zeek/logs/current/ssl.log
      - /zeek/logs/current/ssh.log
      - /zeek/logs/current/notice.log
      - /zeek/logs/current/intel.log
      - /zeek/logs/current/weird.log
      - /zeek/logs/current/files.log
      - /zeek/logs/current/x509.log
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: zeek
      engine: zeek

  # ============================================================
  # SNORT 3 LOGS (IDS signatures)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /var/log/snort/alert_json.txt
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: snort
      engine: snort

  # ============================================================
  # SURICATA LOGS (IDS EVE JSON)
  # ============================================================
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true
    fields_under_root: true
    fields:
      log_type: suricata
      engine: suricata

processors:
  - add_host_metadata: ~
  - timestamp:
      field: ts
      layouts:
        - '2006-01-02T15:04:05.999999Z07:00'
        - '2006-01-02T15:04:05.999999+0000'
      test:
        - '2024-01-01T12:00:00.000000Z'
      ignore_failure: true
  - timestamp:
      field: timestamp
      layouts:
        - '2006-01-02T15:04:05.999999Z07:00'
        - '2006-01-02T15:04:05Z'
      ignore_failure: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "%{[engine]:unknown}-%{+yyyy.MM.dd}"
  bulk_max_size: 500

setup.template.enabled: false
setup.ilm.enabled: false

logging.level: info
logging.to_files: false
