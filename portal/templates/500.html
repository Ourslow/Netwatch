<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 — NetWatch Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg-base: #0a0e16; --bg-elev-2: #141922;
      --crit: #ff4d5e; --crit-glow: rgba(255,77,94,.35);
      --accent: #22d3ee;
      --text: #c9d1d9; --text-muted: #8b949e;
      --border: rgba(255,255,255,.08); --r-lg: 13px;
    }
    body { background: var(--bg-base); color: var(--text); min-height: 100vh;
           display: flex; align-items: center; justify-content: center;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .err-wrap { text-align: center; max-width: 420px; padding: 2rem; }
    .err-code {
      font-size: 6rem; font-weight: 800; line-height: 1;
      color: transparent;
      background: linear-gradient(135deg, var(--crit), rgba(255,77,94,.4));
      -webkit-background-clip: text; background-clip: text;
      letter-spacing: -4px;
    }
    .err-icon {
      width: 64px; height: 64px; border-radius: var(--r-lg); margin: 1rem auto;
      background: rgba(255,77,94,.08); border: 1px solid rgba(255,77,94,.25);
      display: grid; place-items: center;
      font-size: 1.8rem; color: var(--crit);
    }
    .err-title { font-size: 1.15rem; font-weight: 600; color: #e6edf3; margin-bottom: .5rem; }
    .err-sub { font-size: .88rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }
    .btn-home {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(34,211,238,.12); border: 1px solid rgba(34,211,238,.3);
      color: var(--accent); border-radius: 99px; padding: .55rem 1.4rem;
      font-size: .88rem; font-weight: 600; text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    .btn-home:hover { background: rgba(34,211,238,.2); border-color: rgba(34,211,238,.5); color: var(--accent); }
    .btn-retry {
      display: inline-flex; align-items: center; gap: .5rem;
      background: none; border: 1px solid rgba(255,255,255,.12);
      color: var(--text-muted); border-radius: 99px; padding: .55rem 1.4rem;
      font-size: .88rem; font-weight: 600; text-decoration: none; cursor: pointer;
      transition: border-color .15s, color .15s; margin-left: .5rem;
    }
    .btn-retry:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
  </style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-code">500</div>
    <div class="err-icon"><i class="bi bi-exclamation-octagon"></i></div>
    <div class="err-title">Erreur interne du serveur</div>
    <div class="err-sub">
      Une erreur inattendue s'est produite côté serveur.<br>
      Vérifiez que la stack Docker est opérationnelle.
    </div>
    <a href="/" class="btn-home"><i class="bi bi-grid-1x2"></i>Dashboard</a>
    <button onclick="history.back()" class="btn-retry"><i class="bi bi-arrow-counterclockwise"></i>Retour</button>
  </div>
</body>
</html>
