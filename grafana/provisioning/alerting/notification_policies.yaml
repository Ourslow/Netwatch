apiVersion: 1

policies:
  - orgId: 1
    receiver: Slack NetWatch
    group_by: [alertname, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: Slack NetWatch
        matchers:
          - severity =~ "critical|warning"
        group_wait: 10s
        repeat_interval: 1h
