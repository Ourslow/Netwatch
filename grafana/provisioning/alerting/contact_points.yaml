apiVersion: 1

contactPoints:
  - orgId: 1
    name: Slack NetWatch
    receivers:
      - uid: slack-netwatch
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          username: NetWatch Alerting
          icon_emoji: ":shield:"
          title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
          text: |
            *Severité :* {{ range .Alerts }}{{ .Labels.severity }}{{ end }}
            *Description :* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
            *Valeur :* {{ range .Alerts }}{{ .Annotations.value }}{{ end }}
        disableResolveMessage: false

  - orgId: 1
    name: AutoBlock
    receivers:
      - uid: autoblock-webhook
        type: webhook
        settings:
          # AutoBlock tourne en network_mode:host : injoignable par son nom de conteneur
          # depuis Grafana (réseau bridge). AUTOBLOCK_HOST vaut host.docker.internal en
          # déploiement mono-VM (extra_hosts), ou l'IP de la VM Sensors en déploiement
          # 2-VMs (AutoBlock et Grafana ne sont alors plus sur le même hôte physique).
          # Le token authentifie l'appel (voir AUTOBLOCK_WEBHOOK_SECRET dans .env).
          url: http://${AUTOBLOCK_HOST:-host.docker.internal}:5001/webhook/alert?token=${AUTOBLOCK_WEBHOOK_SECRET}
          httpMethod: POST
        disableResolveMessage: true
