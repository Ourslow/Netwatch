# NetWatch v2 — VM Data (déploiement 2-VMs, Shuttle Proxmox)
# Stockage/analyse + dashboards + automatisation. AutoBlock/Zeek/Suricata
# tournent sur la VM Sensors (192.168.100.11) — voir docker-compose.sensors.yml.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: netwatch-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-data:/usr/share/elasticsearch/data
    ports:
      # Lié à l'IP LAN de la VM Data : accessible depuis la VM Sensors
      # (filebeat/beacon-detect/autoblock), pas exposé au-delà de ce réseau.
      - "192.168.100.12:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: netwatch-prometheus
    volumes:
      - ./prometheus/prometheus.data.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      # Lié à l'IP LAN de la VM Data : le portail (sur un autre poste) doit
      # pouvoir l'atteindre pour la page /status.
      - "192.168.100.12:9090:9090"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: netwatch-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: netwatch-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD manquant dans .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-http://localhost/slack-not-configured}
      - AUTOBLOCK_WEBHOOK_SECRET=${AUTOBLOCK_WEBHOOK_SECRET:-}
      # AutoBlock tourne sur la VM Sensors en 2-VMs, plus sur le même hôte que Grafana.
      - AUTOBLOCK_HOST=192.168.100.11
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Lié à l'IP LAN de la VM Data : le portail doit pouvoir l'atteindre.
      - "192.168.100.12:3000:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: netwatch-n8n
    ports:
      # Lié à l'IP LAN de la VM Data : accessible pour la démo depuis un
      # autre poste (portail / navigateur), comme grafana/prometheus.
      - "192.168.100.12:5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?N8N_PASSWORD manquant dans .env}
      - GENERIC_TIMEZONE=Europe/Paris
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: netwatch-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  es-data:
  grafana-data:
  prometheus-data:
  ollama-data:
  n8n-data:
