services:
  # ============================================================
  # MOTEURS D'ANALYSE
  # ============================================================

  zeek:
    build: ./zeek
    container_name: netwatch-zeek
    network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - IFACE=${IFACE:-eth0}
    volumes:
      - ./zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - ./zeek/scripts:/usr/local/zeek/share/zeek/site/scripts:ro
      - ./zeek/intel:/usr/local/zeek/share/zeek/site/intel:ro
      - zeek-logs:/zeek/logs
      - ./pcap:/pcap:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  snort:
    build: ./snort
    container_name: netwatch-snort
    network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - IFACE=${IFACE:-eth0}
      - SNORT_MONITORED_SERVER=${SNORT_MONITORED_SERVER:-127.0.0.1}
    volumes:
      - ./snort/snort.lua:/usr/local/etc/snort/snort.lua:ro
      - ./snort/local.rules:/usr/local/etc/rules/local.rules:ro
      - snort-logs:/var/log/snort
      - ./pcap:/pcap:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  suricata:
    build: ./suricata
    container_name: netwatch-suricata
    network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      - IFACE=${IFACE:-eth0}
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/local.rules:/etc/suricata/rules/local.rules:ro
      - suricata-logs:/var/log/suricata
      - ./pcap:/pcap:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # PIPELINE DE DONNEES
  # ============================================================

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: netwatch-filebeat
    user: root
    # Le filebeat.yml est monté depuis l'hôte (propriétaire ≠ root) : on désactive
    # le contrôle strict de permissions qui refuse sinon de charger la config.
    command: ["-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - zeek-logs:/zeek/logs:ro
      - snort-logs:/var/log/snort:ro
      - suricata-logs:/var/log/suricata:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: netwatch-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-data:/usr/share/elasticsearch/data
    ports:
      # Lié à localhost uniquement : ES n'a pas d'auth (xpack.security off).
      # Accès externe = via Grafana (datasource interne). Ne pas exposer sur 0.0.0.0.
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: netwatch-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      # Lié à localhost : Prometheus n'a pas d'auth. Grafana l'atteint via le réseau interne.
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: netwatch-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: netwatch-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      # URL non vide par défaut : sans webhook réel, Grafana refuse de démarrer
      # (le contact point Slack exige une URL non vide). Renseigner SLACK_WEBHOOK_URL pour activer.
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-http://localhost/slack-not-configured}
      - AUTOBLOCK_WEBHOOK_SECRET=${AUTOBLOCK_WEBHOOK_SECRET:-}
    extra_hosts:
      # Permet à Grafana (réseau bridge) d'atteindre AutoBlock (network_mode:host)
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # ANALYSE COMPORTEMENTALE (RITA-lite)
  # ============================================================

  beacon-detect:
    build: ./beacon-detect
    container_name: netwatch-beacon-detect
    environment:
      - ES_URL=http://elasticsearch:9200
      - SCAN_INTERVAL_MIN=15
      - LOOKBACK_HOURS=2
      - MIN_CONNECTIONS=8
      - BEACON_CV_THRESHOLD=0.25
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # REPONSE AUTOMATIQUE (AutoBlock webhook)
  # ============================================================

  autoblock:
    build: ./autoblock
    container_name: netwatch-autoblock
    network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - ES_URL=http://localhost:9200
      - WEBHOOK_PORT=5001
      - WEBHOOK_SECRET=${AUTOBLOCK_WEBHOOK_SECRET:-}
      - BLOCK_DURATION_MIN=${BLOCK_DURATION_MIN:-60}
      - MAX_BLOCKS_PER_HOUR=20
      - DRY_RUN=${AUTOBLOCK_DRY_RUN:-true}
      - ALLOWLIST=${AUTOBLOCK_ALLOWLIST:-}
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # DETECTION ET BLOCAGE COLLABORATIF (CrowdSec)
  # ============================================================

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: netwatch-crowdsec
    environment:
      # Collections installées au premier démarrage du container.
      # Note: crowdsecurity/zeek n'existe pas dans le hub officiel (juin 2026).
      # Zeek logs lus via parsers syslog intégrés à crowdsecurity/linux.
      # crowdsecurity/suricata gère le format EVE JSON natif de Suricata.
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/nginx crowdsecurity/suricata
      - CUSTOM_HOSTNAME=netwatch-crowdsec
    volumes:
      # Config d'acquisition des sources de logs
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      # Base de données CrowdSec (décisions, bouncers, métriques)
      - crowdsec-db:/var/lib/crowdsec/data
      # Logs Zeek (read-only) — volume partagé avec le service zeek
      - zeek-logs:/zeek/logs:ro
      # Logs Suricata EVE JSON (read-only) — volume partagé avec le service suricata
      - suricata-logs:/var/log/suricata:ro
    restart: unless-stopped

  # ============================================================
  # AUTOMATISATION (n8n — workflows alertes ES → Teams)
  # ============================================================

  n8n:
    image: n8nio/n8n:latest
    container_name: netwatch-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Désactiver les diagnostics / télémétrie
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      # Basic auth — changer en prod
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-netwatch2026}
      # Timezone pour les crons
      - GENERIC_TIMEZONE=Europe/Paris
      # Webhook base URL (pour callbacks externes)
      - WEBHOOK_URL=http://localhost:5678/
    extra_hosts:
      # Permet à n8n (bridge) d'atteindre ES sur l'hôte (127.0.0.1:9200)
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # ASSISTANT IA LOCAL (explication d'alertes, résumé exécutif)
  # ============================================================

  ollama:
    image: ollama/ollama:latest
    container_name: netwatch-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Modèle attendu par le portail : OLLAMA_MODEL (défaut "mistral")
    # Première utilisation : docker exec netwatch-ollama ollama pull mistral
    restart: unless-stopped

volumes:
  zeek-logs:
  snort-logs:
  suricata-logs:
  es-data:
  grafana-data:
  prometheus-data:
  ollama-data:
  # Volume persistant pour la base de données CrowdSec (décisions, bouncers)
  crowdsec-db:
  n8n-data:
