services:
  # ============================================================
  # MOTEURS D'ANALYSE
  # ============================================================

  zeek:
    build: ./zeek
    container_name: netwatch-zeek
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - ./zeek/scripts:/usr/local/zeek/share/zeek/site/scripts:ro
      - zeek-logs:/zeek/logs
      - ./pcap:/pcap:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  snort:
    build: ./snort
    container_name: netwatch-snort
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./snort/snort.lua:/usr/local/etc/snort/snort.lua:ro
      - ./snort/local.rules:/usr/local/etc/rules/local.rules:ro
      - snort-logs:/var/log/snort
      - ./pcap:/pcap:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  suricata:
    build: ./suricata
    container_name: netwatch-suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/local.rules:/etc/suricata/rules/local.rules:ro
      - suricata-logs:/var/log/suricata
      - ./pcap:/pcap:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # PIPELINE DE DONNEES
  # ============================================================

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: netwatch-filebeat
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - zeek-logs:/zeek/logs:ro
      - snort-logs:/var/log/snort:ro
      - suricata-logs:/var/log/suricata:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: netwatch-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: netwatch-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zeek-logs:
  snort-logs:
  suricata-logs:
  es-data:
  grafana-data:
