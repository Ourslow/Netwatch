acceptance:
  - "Créer scripts/security/ioc-enrich.py : prend ioc-graph-output.json en entrée, enrichit chaque nœud IP"
  - "Source 1 — AbuseIPDB (gratuit, 1000 req/jour) : abuseConfidenceScore, countryCode, isp, usageType, totalReports"
  - "Source 2 — ipinfo.io (fallback sans API key) : country, org, hostname"
