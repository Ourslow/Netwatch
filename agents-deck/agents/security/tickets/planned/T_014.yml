context: |
  Aujourd'hui le graphe IOC montre des relations mais pas de priorisation.
  Le score de risque composite permet de dire "cette IP est critique, celle-là est noise".

  Sources de données :
  - ES indices suricata-*, snort-*, zeek-* (alertes 24h par défaut, --days configurable)
  - ioc-enrich-cache.json (enrichissement AbuseIPDB/ipinfo.io existant)
  - Format Suricata : src_ip, alert.severity (1=critical,2=high,3=medium,4=low)
  - Format Snort : src_ip, priority (1=high,2=medium,3=low)
  - Format Zeek : id.orig_h, event_type

  Le score sera affiché dans /exec (top 3 IPs), dans /graph (taille du nœud),
  et déclenche l'escalade automation T_015 si score ≥ 80.
