context: |
  Understand-Anything est un framework de knowledge graph pour extraire des entités
  et relations depuis du texte non structuré. L'objectif est de l'appliquer aux
  alertes IDS NetWatch pour construire un graphe IOC : quelles IPs communiquent
  avec quels domaines, sous quelles règles, avec quels TTPs MITRE.

  Ressources :
  - Alertes ES : index suricata-*, snort-*, zeek-* sur localhost:9200
  - Format Suricata : champs src_ip, dest_ip, alert.signature, alert.category, alert.metadata.mitre_*
  - Script existant : simulate-traffic.py (peut générer des données de test)

  Si Understand-Anything n'est pas dispo : implémenter un graphe NetworkX + export JSON
  qui remplit le même objectif (visualisation des relations IOC).
