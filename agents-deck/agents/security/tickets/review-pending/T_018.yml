delivery:
  summary: |
    T_018 livré : 2 scripts Zeek + 1 script Python de monitoring TLS.

    tcp-performance.zeek logue les métriques TCP (RTT, retransmissions, zero-window,
    syn_ack_ms approximatif, history, conn_state) dans tcp_perf.log via le module
    TCP_PERF. Le RTT est extrait de c$conn$rtt (built-in Zeek) converti en ms ;
    les zero-windows sont déduits du champ history ('w'=orig, 'W'=resp).

    app-response-time.zeek calcule l'ART applicatif pour HTTP (delta http_request /
    http_reply), DNS (rtt built-in relu depuis dns_end) et TLS (delta ssl_client_hello /
    ssl_server_hello). Tout est agrégé dans art.log via le module ART.

    tls-cert-monitor.py interroge ES zeek-* sur la fenêtre --days, analyse les champs
    ssl.*, détecte expiry dans 30j (warning) / 7j (critical), self-signed, ciphers faibles
    (RC4/DES/3DES/EXPORT/NULL/anon) et TLS < 1.2. Output JSON trié par sévérité décroissante.
    Exit code 2=critical, 1=warning/high, 0=ok. Mode --demo intégré si ES indisponible.

    zeek/local.zeek mis à jour avec les deux @load.
  technical: |
    - zeek/scripts/tcp-performance.zeek : module TCP_PERF, export Info record (13 champs &log),
      event zeek_init() crée le stream tcp_perf, event connection_state_remove filtre sur tcp,
      extrait rtt via interval_to_double(c$conn$rtt)*1000, retransmits depuis orig_retrans_pkts/
      resp_retrans_pkts, zero-window via regex /w/ et /W/ sur c$conn$history,
      syn_ack_ms approché via c$conn$duration si <1000ms
    - zeek/scripts/app-response-time.zeek : module ART, tables http_req_ts/http_req_detail/
      tls_hello_ts/tls_hello_sni avec create_expire=30sec, events http_request+http_reply
      (delta en ms), dns_end (c$dns$rtt built-in), ssl_client_hello+ssl_server_hello (delta ms)
    - scripts/security/tls-cert-monitor.py : stdlib pure (urllib, json, argparse, datetime),
      elasticsearch-py optionnel (fallback urllib), query ES size 5000 sur zeek-*/ssl.*,
      parse_expiry() supporte 3 formats, is_weak_cipher() + is_old_tls(), deduplicate() par
      (sni, issuer) garde le plus sévère, sev_order critical>high>warning>ok, demo_records()
      intégré avec 4 cas de test (ok, expiry5j+self-signed, RC4+TLS1.1+expiry25j, expired)
    - zeek/local.zeek : 2 lignes @load ajoutées après dns-entropy.zeek
  delivered_at: "2026-06-30T14:30:00Z"
