context: |
  Le pipeline Filebeat→ES génère des erreurs data-stream. Les logs Zeek/Snort/Suricata
  ne s'indexent pas correctement. ES 8.x utilise des data-streams par défaut mais
  NetWatch s'appuie sur des index classiques (zeek-2026.06.30). Il y a probablement
  un conflit de stratégie d'indexation dans la config Filebeat ou les templates ES.

  Fichiers concernés :
  - filebeat/filebeat.yml (déjà modifié : pattern "zeek-*,snort-*,suricata-*,netwatch-*")
  - docker-compose.yml (service filebeat)
  - ES : curl http://localhost:9200/_cat/indices pour voir l'état réel
