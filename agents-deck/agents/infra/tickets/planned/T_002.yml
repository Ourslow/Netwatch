acceptance:
  - "Diagnostiquer pourquoi Filebeat échoue à indexer dans ES (erreur data-stream vs index classique)"
  - "Créer ou corriger les index templates ES manquants pour zeek-*, snort-*, suricata-*"
  - "Modifier filebeat/filebeat.yml si nécessaire (setup.template, index strategy)"
