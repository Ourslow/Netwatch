  Le Makefile existe déjà avec targets : start, stop, demo, logs, build, health, clean.
  La target 'health' existe mais est basique. L'améliorer avec scripts/health-check.sh.

  Proxmox cible : Shuttle avec Xeon, 16 Go RAM, 2 ports réseau (i350-T2).
  Vision : 2 VMs — VM-Sensors (Zeek/Snort/Suricata, 6 Go) + VM-Data (ES/Grafana, 8 Go).

  Le guide doit être autonome : quelqu'un qui clone le repo doit pouvoir
  déployer NetWatch en moins de 30 minutes en suivant le guide.

  Fichiers à créer/modifier :
  - docs/deployment-guide.md (nouveau)
  - scripts/health-check.sh (nouveau)
  - Makefile (modifier target health)
