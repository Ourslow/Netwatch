created: "2026-06-30"
acceptance:
  - "Ajouter service snmp-exporter dans docker-compose.yml (image prom/snmp-exporter:latest, port 9116)"
  - "Config snmp-exporter : snmp.yml avec module ifMIB (IF-MIB) pour interfaces + hrSystemUptime + sysDescr/sysName"
  - "Prometheus scrape config : ajouter job snmp dans prometheus/prometheus.yml (targets depuis .env SNMP_TARGETS)"
  - "Métriques clés exposées : ifHCInOctets, ifHCOutOctets, ifOperStatus, ifSpeed, ifDescr, sysName"
  - "Calcul bandwidth utilization % dans Grafana : rate(ifHCInOctets) / ifSpeed * 800"
  - "Dashboard Grafana snmp-interfaces.json : top 10 interfaces par utilisation, statut operationnel, bytes in/out par interface (time series), tableau récapitulatif"
  - "Variable Grafana $device : liste des équipements SNMP depuis label snmp_target"
  - "Intégrer dans scripts/health-check.sh : check port 9116 + Prometheus job snmp"
  - "Documenter dans docs/snmp-setup.md : communauté SNMP v2c, SNMP v3 auth, config Cisco/HP/Juniper"
context: |
  Prometheus SNMP exporter est le standard pour SNMP → métriques.
  Il utilise un fichier snmp.yml généré par snmp-generator à partir des MIBs.

  Config minimale snmp.yml (IF-MIB) :
  modules:
    ifmib:
      walk:
        - 1.3.6.1.2.1.2.2   # ifTable
        - 1.3.6.1.2.1.31.1  # ifXTable (64-bit counters)
      metrics:
        - name: ifHCInOctets
          oid: 1.3.6.1.2.1.31.1.1.1.6
          type: counter
          indexes: [{labelname: ifIndex, type: gauge}]
          lookups: [{labels: [ifIndex], labelname: ifDescr, oid: 1.3.6.1.2.1.2.2.1.2}]
        - name: ifHCOutOctets
          oid: 1.3.6.1.2.1.31.1.1.1.10
          type: counter
          ...

  Prometheus scrape via params (standard SNMP exporter) :
  - job_name: snmp
    static_configs: [{targets: ["${SNMP_TARGET_1}", "${SNMP_TARGET_2}"]}]
    metrics_path: /snmp
    params: {module: [ifmib]}
    relabel_configs: ...

  Si aucun équipement SNMP dispo → utiliser l'hôte local (snmpd sur lo) pour les tests.
  Package snmpd + snmp-mibs-downloader disponible sur Ubuntu.
