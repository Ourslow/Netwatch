delivery:
  summary: |
    Recording rules Prometheus pour capacity planning (3 métriques dérivées SNMP).
    Dashboard Grafana capacity-planning.json complet : variable $device, table de saturation
    avec couleurs rouge/orange/vert, time series historique 30j + predict_linear pointillé,
    2 stat panels critiques/tension. Row Capacity Planning ajouté à snmp-interfaces.json.
    Documentation technique complète dans docs/capacity-planning.md.
  implementation: |
    prometheus/rules/capacity.yml : 3 recording rules évaluées toutes les 5 min.
    netwatch:iface_bytes_rate = rate(ifHCInOctets[5m]).
    netwatch:iface_growth_rate_7d = deriv(rate(...)[7d:5m]).
    netwatch:iface_days_to_saturation = clamp_min((capacité_restante) / clamp_min(croissance_quotidienne, 0.001), 0).

    prometheus/prometheus.yml : ajout block rule_files avant scrape_configs.
    docker-compose.yml : volume mount ./prometheus/rules:/etc/prometheus/rules:ro sur service prometheus.

    capacity-planning.json : 7 panels (2 rows + 2 stat + 1 table + 1 row + 1 timeseries).
    Table : 4 queries instant (rate, utilisation%, croissance/j, jours saturation) + merge transform + organize.
    Timeseries : query A solid (historique) + query B dashed override (predict_linear 30*86400).
    Stat panels : count() with "or vector(0)" pour afficher 0 si aucun résultat.

    snmp-interfaces.json : créé (T_021 pas encore livré) avec stub interfaces SNMP + row
    Capacity Planning (panels id 100-102) en bas du dashboard.

    docs/capacity-planning.md : formule décomposée, tableau seuils, interprétation cas limites,
    guide ajustement polling interval par équipement, exemples PromQL v3 SNMP.
