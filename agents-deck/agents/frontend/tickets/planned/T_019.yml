context: |
  Cette page est l'équivalent de la vue 'Top Talkers' + 'Response Time' de nGeniusONE.

  Si l'index netflow-* n'existe pas encore (GoFlow2 T_017 pas encore actif) :
  - fallback sur Zeek conn.log (orig_bytes + resp_bytes par src_ip)
  - afficher un banner "GoFlow2 non connecté — données depuis Zeek conn.log"

  Seuils ART (configurables dans config.py) :
  - HTTP : vert <200ms, orange 200-500ms, rouge >500ms
  - DNS : vert <50ms, orange 50-200ms, rouge >200ms
  - TLS : vert <300ms, orange 300-800ms, rouge >800ms

  Seuils TCP :
  - Retransmissions : vert <1%, orange 1-3%, rouge >3%
  - RTT : vert <50ms, orange 50-150ms, rouge >150ms

  Les APIs peuvent fallback gracieusement si les index n'existent pas
  (retourner {data: [], warning: "index netflow-* introuvable"}).
