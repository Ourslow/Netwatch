context: |
  Le script scripts/security/ioc-graph.py existe déjà et génère
  scripts/security/ioc-graph-output.json (format {nodes, edges, stats}).

  Format nodes : [{id, label, type, weight, ...}]
  Format edges : [{source, target, weight, label}]
  Types de nœuds : ip_src, ip_dst, rule, mitre_ttp, domain

  Le portail tourne sur localhost:5050 (Flask 3.x, Bootstrap 5, dark theme).
  D3.js v7 peut être chargé via CDN. Utiliser une simulation force-directed
  (d3.forceSimulation) avec zoom/pan (d3.zoom).

  Fichiers clés :
  - portal/app.py : ajouter route /graph et /api/ioc-graph
  - portal/templates/graph.html : nouveau template
  - portal/templates/base.html : ajouter entrée nav
  - scripts/security/ioc-graph.py : appeler en subprocess depuis Flask
