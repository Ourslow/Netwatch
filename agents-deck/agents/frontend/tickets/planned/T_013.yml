context: |
  Le portail a déjà une page /audit avec score et recommandations, et /report avec PDF.
  /exec est différent : 1 page, lecture en 30 secondes, orientée management/RSSI.
  Pas de tableaux, pas de détail — juste les chiffres qui comptent.

  Inspiration design : dashboard SOC type "security posture overview".
  Bootstrap 5 dark theme déjà en place. Chart.js disponible (déjà utilisé ailleurs).

  Score de posture (exemple) :
  - Base 100
  - -5 par alerte critique (24h), cap à -40
  - -2 par alerte high (24h), cap à -20
  - -1 par règle unique déclenchée, cap à -20
  - Résultat : 20-100, affiché avec couleur (>80 vert, 60-80 orange, <60 rouge)

  API /api/exec-stats à créer (JSON) pour le PDF et un éventuel monitoring externe.
