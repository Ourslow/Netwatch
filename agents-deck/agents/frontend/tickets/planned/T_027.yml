context: |
  Calcul compliance par bucket ES :
  - date_histogram interval=5m sur 7j
  - sub-agg percentiles (95) sur art_ms ou rtt
  - Compter buckets où p95 < target → compliance %

  Business hours filter ES :
  "script": {
    "source": "doc['@timestamp'].value.getHour() >= 8 && doc['@timestamp'].value.getHour() < 18 && doc['@timestamp'].value.getDayOfWeek() >= 1 && doc['@timestamp'].value.getDayOfWeek() <= 5"
  }

  La page /sla est l'équivalent NetWatch du "SLA Compliance Report" de Riverbed NetProfiler.
  C'est ce que les DSI regardent pour justifier la qualité du réseau.

  Config par défaut dans config.py :
  SLA_HTTP_TARGET_MS = int(os.getenv("SLA_HTTP_TARGET_MS", "200"))
  SLA_DNS_TARGET_MS  = int(os.getenv("SLA_DNS_TARGET_MS", "50"))
  SLA_RTT_TARGET_MS  = int(os.getenv("SLA_RTT_TARGET_MS", "50"))
  SLA_TARGET_PCT     = float(os.getenv("SLA_TARGET_PCT", "99.0"))
