context: |
  ServiceNow REST API (Basic auth ou OAuth2) :
  POST /api/now/table/incident
  Body : {"short_description": "...", "urgency": "2", "category": "network",
          "description": "...", "assignment_group": "NOC"}
  Response : {"result": {"sys_id": "abc123", "number": "INC0012345"}}

  JIRA Cloud REST API v3 :
  POST /rest/api/3/issue
  Headers : Authorization: Basic base64(user:token)
  Body : {"fields": {"project": {"key": "NOC"}, "summary": "...",
          "issuetype": {"name": "Bug"}, "priority": {"name": "High"},
          "description": {"type": "doc", "version": 1, "content": [...]}}}

  Les workflows n8n utilisent les nodes natifs ServiceNow et JIRA.
  itsm-sync.py est le fallback CLI si n8n n'est pas configurĂ©.

  Variables .env minimales ServiceNow :
  ITSM_BACKEND=servicenow
  SNOW_INSTANCE=mycompany
  SNOW_USER=admin
  SNOW_PASSWORD=xxx

  Variables .env minimales JIRA :
  ITSM_BACKEND=jira
  JIRA_URL=https://mycompany.atlassian.net
  JIRA_USER=nicolas@company.com
  JIRA_TOKEN=xxx
  JIRA_PROJECT_KEY=NOC
