context: |
  Quand une alerte critique arrive dans ES (ex: Meterpreter, C2 beacon, DNS tunneling),
  un ticket doit être automatiquement créé dans le dossier drafts/ de l'agent security
  pour qu'il puisse l'investiguer. Le ticket doit contenir suffisamment de contexte
  (IP source, règle, timestamp, lien portail) pour être actionnable sans ouvrir ES.

  n8n est déjà en marche sur localhost:5678 (auth admin/netwatch2026).
  Le workflow T_006 (alertes Teams) est déjà créé — s'en inspirer pour la structure ES Query.

  Le dossier cible : agents-deck/agents/security/tickets/drafts/
  L'agent security peut ensuite promouvoir ces tickets en planned/ manuellement.

  Contrainte technique : n8n doit écrire des fichiers dans le filesystem de l'hôte.
  Utiliser un nœud 'Execute Command' ou un webhook vers un script Python sur l'hôte.
  Script cible : scripts/automation/create-ticket.py (à créer).
